<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Materiales</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1916;
    --text-muted: #7a7870;
    --accent: #2a5c45;
    --accent-light: #e8f0ec;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .badge {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 99px;
  }
  main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .search-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-wrap input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 14px 9px 36px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: var(--text-muted); pointer-events: none;
  }
  .total { font-size: 13px; color: var(--text-muted); }
  .total strong { color: var(--text); }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .product-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
  .product-thumb { width: 100%; height: 150px; object-fit: cover; display: block; background: var(--bg); }
  .product-thumb.no-img {
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--border);
  }
  .product-body { padding: 12px 14px; }
  .product-sku {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--accent); background: var(--accent-light);
    padding: 2px 7px; border-radius: 4px;
    display: inline-block; margin-bottom: 6px;
  }
  .product-desc {
    font-size: 13px; color: var(--text); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;
  }
  .product-stock { font-size: 12px; color: var(--text-muted); }
  .product-stock strong { color: var(--text); font-weight: 600; }
  .product-date { font-size: 11px; color: #bbb8b0; margin-top: 4px; }

  .empty-state { text-align: center; padding: 4rem 0; color: var(--text-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .loading-state { text-align: center; padding: 3rem 0; color: var(--text-muted); font-size: 14px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    max-width: 480px; width: 100%; overflow: hidden;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .modal img { width: 100%; max-height: 320px; object-fit: cover; display: block; }
  .modal-body { padding: 20px; }
  .modal-sku { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); background: var(--accent-light); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
  .modal-desc { font-size: 15px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
  .modal-stock { font-size: 14px; color: var(--text-muted); }
  .modal-stock strong { color: var(--text); }
  .modal-close {
    display: block; width: 100%; padding: 12px;
    margin-top: 16px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; color: var(--text);
  }
  .modal-close:hover { background: var(--border); }

  @media (max-width: 600px) {
    main { padding: 20px 14px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Catálogo <span>Materiales</span></div>
  <div class="badge">Vista de consulta</div>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar por SKU o descripción..." oninput="filterProducts()">
    </div>
    <div class="total" id="total"></div>
  </div>
  <div id="product-list"><div class="loading-state">Cargando catálogo...</div></div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <img id="modal-img" src="" alt="foto">
    <div class="modal-body">
      <div id="modal-sku" class="modal-sku"></div>
      <div id="modal-desc" class="modal-desc"></div>
      <div id="modal-stock" class="modal-stock"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">Cerrar</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1FrwwYQ5oW0DwZDFrBAdfVEIBAuiGI6Cgf-IwjPBtUKk';
const API_KEY_PLACEHOLDER = 'AIzaSyDYSFDFDK6-Gozg7eSgODfEwaG8a1TIWV8';
let allProducts = [];

async function loadProducts() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A2:E1000?key=${API_KEY_PLACEHOLDER}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { showError(data.error.message); return; }
    allProducts = (data.values || []).reverse();
    renderProducts(allProducts);
  } catch(e) { showError(e.message); }
}

function renderProducts(rows) {
  const el = document.getElementById('product-list');
  document.getElementById('total').innerHTML = '<strong>' + rows.length + '</strong> producto' + (rows.length !== 1 ? 's' : '');
  if (!rows.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No se encontraron productos</p></div>';
    return;
  }
  el.innerHTML = '<div class="product-grid">' + rows.map((row, i) => {
    const [sku, desc, stock, photo] = row;
    return '<div class="product-card" onclick="openModal(' + i + ')" style="cursor:pointer;">' +
      (photo
        ? '<img class="product-thumb" src="' + photo + '" alt="foto" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;product-thumb no-img&quot;>📦</div>\'">'
        : '<div class="product-thumb no-img">📦</div>') +
      '<div class="product-body">' +
      (sku   ? '<div class="product-sku">' + sku + '</div>' : '') +
      (desc  ? '<div class="product-desc">' + desc + '</div>' : '') +
      (stock ? '<div class="product-stock">Stock: <strong>' + stock + '</strong></div>' : '') +
      '</div></div>';
  }).join('') + '</div>';
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) { renderProducts(allProducts); return; }
  renderProducts(allProducts.filter(r => (r[0]||'').toLowerCase().includes(q) || (r[1]||'').toLowerCase().includes(q)));
}

function openModal(idx) {
  const [sku, desc, stock, photo] = allProducts[idx];
  const img = document.getElementById('modal-img');
  if (photo) { img.src = photo; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('modal-sku').textContent = sku || '';
  document.getElementById('modal-sku').style.display = sku ? 'inline-block' : 'none';
  document.getElementById('modal-desc').textContent = desc || '';
  document.getElementById('modal-stock').innerHTML = stock ? 'Stock disponible: <strong>' + stock + '</strong>' : '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

loadProducts();
</script>
</body>
</html>
